<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Commercial Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</head>
<body>
  <header class="top">
    <div class="brand"><span class="tick">▮</span> Commercial Intelligence</div>
    <nav class="top-nav" aria-label="Primary">
      <a href="/" class="{{ 'active' if active == 'overview' else '' }}">Territories</a>
      <a href="/targeting" class="{{ 'active' if active == 'targeting' else '' }}">Targeting</a>
      <a href="/docs">API docs</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="bottom">
    Portfolio project · synthetic data modeled on CMS Medicare Part D ·
    territory structure is illustrative, not real
  </footer>
</body>
</html>
